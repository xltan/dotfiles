set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'mattdavis90/base16-tmux'
set -g @colors-base16 'tomorrow-night'
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @plugin 'xltan/nord-tmux'
# set -g @nord_tmux_show_status_content "0"
# set -g @nord_tmux_no_patched_font "1"
# set -g @plugin 'christoomey/vim-tmux-navigator'

# for vim
set -g @resurrect-strategy-vim 'session'
# for neovim
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g renumber-windows on

unbind-key C-b
set -g prefix 'C-g'
bind-key 'C-g' send-prefix

bind C-g set -g mouse
set -g mouse on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi C-g send-keys -X page-up

# Fix titlebar
set -g set-titles on
set -g set-titles-string "#T"

bind H resize-pane -L 10
bind L resize-pane -R 10
bind K resize-pane -U 5
bind J resize-pane -D 5

bind '"' split-window -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'
bind 'c' new-window -c '#{pane_current_path}'

bind h if-shell -b '[ "$(tmux lsp | wc -l | bc)" = 1 ]' "split-window -b -h -c '#{pane_current_path}'" "select-pane -L"
bind l if-shell -b '[ "$(tmux lsp | wc -l | bc)" = 1 ]' "split-window -h -c '#{pane_current_path}'" "select-pane -R"
bind k if-shell -b '[ "$(tmux lsp | wc -l | bc)" = 1 ]' "split-window -b -c '#{pane_current_path}'" "select-pane -U"
bind j if-shell -b '[ "$(tmux lsp | wc -l | bc)" = 1 ]' "split-window -c '#{pane_current_path}'" "select-pane -D"
bind u if-shell -b '[ "$(tmux lsp | wc -l | bc)" = 2 ]' "last-pane; resize-pane -Z" "select-pane -U \; resize-pane -Z"
bind o if-shell -b '[ "$(tmux lsp | wc -l | bc)" = 1 ]' "split-window -c '#{pane_current_path}'" "last-pane"
bind m if-shell -b '[ "$(tmux lsw | wc -l | bc)" = 1 ]' "new-window" "last-window"
bind t split-window -h -c '#{pane_current_path}' \; resize-pane -x 66
bind C-l clear-history

# Add truecolor support
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ',xterm*:smglr=\E7\E[?69h\E[%i%p1%d;%p2%ds\E8:mgc=\E7\E[?69l\E8'

run '~/.tmux/plugins/tpm/tpm'

